name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで複数実行されたら古い実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node と pnpm のバージョンは .nvmrc / packageManager に合わせる
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm バージョンは package.json の packageManager フィールドから自動検出
      # （version 明示指定との衝突 ERR_PNPM_BAD_PM_VERSION を回避するため with 省略）
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        # カバレッジ閾値（domain 90%, renderer keybindings 60%）を含む品質ゲート
        # [test_strategy.md §8.2]
      - run: pnpm test -- --coverage

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest

    env:
      # Integration テスト用 SQLite ファイル。
      # テストヘルパー（apps/api/test/helpers.ts）が各テスト前に DELETE で掃除する。
      # ファイルはマイグレーション済みであること。
      DATABASE_URL: file:${{ github.workspace }}/dayborad_test.db

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Integration テスト前にスキーマを適用（SQLite ファイルへ）
      - run: pnpm db:migrate
      - run: pnpm test:integration
